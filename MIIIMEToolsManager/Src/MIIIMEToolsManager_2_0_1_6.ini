; MIIIME Tools Manager Configuration
; ⓒ 2026 MIIIME

; 이 파일은 ANSI 인코딩으로 저장되어야 합니다.
; This file must be saved in ANSI encoding.

[Options]
; LogLevel: 0=Off, 1=All(no DEBUG), 2=DEBUG, 3=INFO+, 4=WARN+, 5=ERROR
LogLevel=2
; Local: 언어 설정 / Language setting
; Kr = 한국어 / Korean  ->  Loc\Kr.ini 필요 / Requires Loc\Kr.ini
; 비워두면 영어 사용 / Leave empty to use English (default)
Local=

[MTM]
; ShowSelf: MTM 자신을 프로세스 리스트에 표시 (0=숨김, 1=표시)
; ShowSelf: Display MTM in the process list (0=Hide, 1=Show)
ShowSelf=1
; TerminateAllOnLauncher: 런쳐 종료 시 연결된 모든 프로세스 함께 종료 (0=런쳐만, 1=트리 전체)
; TerminateAllOnLauncher: Terminate the entire process tree when the launcher closes (0=Launcher only, 1=Entire tree)
TerminateAllOnLauncher=0
; CloseToTray: 창 닫기 버튼 클릭 시 트레이로 최소화 (0=종료, 1=트레이로)
; CloseToTray: Minimize to system tray instead of closing (0=Exit, 1=Tray)
CloseToTray=1

[Advanced]
; LogRotationSize: 로그 파일 최대 크기 (바이트). 초과 시 .log.old로 로테이션
; LogRotationSize: Maximum log file size in bytes. Rotates to .log.old when exceeded.
LogRotationSize=5242880
; 아래 값들은 비워두면 기본값 사용. 파이프(|)로 복수 지정 가능.
; Leave the values below blank to use defaults. Multiple values can be separated by a pipe (|).
;LauncherSuffixes=_M
;ToolPrefix=MIIIME
;BakkMarker=_bakk
;TempPrefix=MIIIME_
;LockFiles=Cleanup.lock|SysInject.lock
;StateFile=State.ini
;EnvDir=_MIIIMEEnv
